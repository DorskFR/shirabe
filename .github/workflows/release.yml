name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  # Build + push the shirabe container image to ghcr, tag-driven. The build is
  # self-contained: public base images, crates.io deps, runtime-checked sqlx (no
  # MusicBrainz DB at build), no secrets baked in.
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # linux/amd64 only — matches the single-arch deploy the cluster runs;
      # rust-via-QEMU arm64 is too slow to justify here.
      - name: Build + push shirabe image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/dorskfr/shirabe:${{ steps.ver.outputs.version }}
            ghcr.io/dorskfr/shirabe:latest
