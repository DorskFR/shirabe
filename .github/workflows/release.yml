name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  # Build + push the shirabe container image to the homelab Harbor registry,
  # tag-driven. The build is self-contained: public base images, crates.io deps,
  # runtime-checked sqlx (no MusicBrainz DB at build), no secrets baked in.
  #
  # Requires repo/org secrets:
  #   HARBOR_REGISTRY  e.g. harbor.dorsk.dev
  #   HARBOR_USERNAME  a Harbor robot/user with push to project "cyberia"
  #   HARBOR_PASSWORD  its secret/token
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # linux/amd64 only — matches the single-arch deploy the cluster runs;
      # rust-via-QEMU arm64 is too slow to justify here.
      - name: Build + push shirabe image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.HARBOR_REGISTRY }}/cyberia/shirabe:${{ steps.ver.outputs.version }}
            ${{ secrets.HARBOR_REGISTRY }}/cyberia/shirabe:latest
